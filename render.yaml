databases:
  - name: smartkal-db
    plan: free
    databaseName: smartkal
    user: smartkal
    region: frankfurt

services:
  # Backend API
  - type: web
    name: smartkal-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartkal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPERGET_API_KEY
        sync: false
      - key: CORS_ORIGINS
        fromService:
          name: smartkal-frontend
          type: web
          property: url
      - key: ENVIRONMENT
        value: production

  # Frontend static site
  - type: web
    name: smartkal-frontend
    runtime: static
    plan: free
    region: frankfurt
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
